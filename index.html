<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a1a;min-height:100vh;padding:1.5rem}
:root{--cp:#185FA5;--cp-l:#E6F1FB;--radius:8px;--radius-lg:12px;--border:0.5px solid rgba(0,0,0,0.12);--bg:#ffffff;--bg2:#f5f5f3;--text:#1a1a1a;--text2:#6b6b6b;--text3:#9a9a9a}
.container{max-width:900px;margin:0 auto}
.btn{padding:8px 16px;border-radius:var(--radius);border:0.5px solid rgba(0,0,0,0.2);background:#fff;color:var(--text);font-size:13px;cursor:pointer;transition:background 0.15s;font-family:inherit}
.btn:hover{background:#f0f0ee}
.btn-primary{background:var(--cp);color:#fff;border-color:var(--cp)}
.btn-primary:hover{background:#0C447C}
.btn-green{background:#3B6D11;color:#fff;border-color:#3B6D11}
.btn-green:hover{background:#27500A}
.btn-sm{padding:5px 12px;font-size:12px}
.onboard{min-height:80vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;text-align:center}
.onboard-title{font-size:26px;font-weight:600;color:var(--text)}
.onboard-sub{font-size:15px;color:var(--text2);max-width:420px;line-height:1.6}
.onboard-form{display:flex;gap:8px;width:100%;max-width:400px}
.onboard-input{flex:1;padding:10px 14px;border-radius:var(--radius);border:1px solid rgba(0,0,0,0.2);font-size:15px;font-family:inherit}
.logo{width:64px;height:64px;border-radius:50%;background:#E6F1FB;display:flex;align-items:center;justify-content:center;font-size:24px;color:#185FA5;font-weight:600;margin-bottom:0.5rem}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:12px}
.title{font-size:22px;font-weight:600;color:var(--text)}
.subtitle{font-size:13px;color:var(--text2);margin-top:2px}
.user-chip{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;background:#fff;border:var(--border);font-size:13px}
.user-avatar{width:24px;height:24px;border-radius:50%;background:#E6F1FB;color:#0C447C;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.backend-banner{border-radius:var(--radius);padding:11px 14px;margin-bottom:1rem;font-size:13px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.backend-banner button{padding:5px 12px;border-radius:var(--radius);font-size:12px;cursor:pointer;border:none;font-family:inherit;white-space:nowrap}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:1.5rem}
@media(max-width:600px){.stats{grid-template-columns:repeat(2,1fr)}}
.stat{background:#fff;border-radius:var(--radius);padding:14px;border:var(--border)}
.stat-label{font-size:12px;color:var(--text2);margin-bottom:4px}
.stat-value{font-size:24px;font-weight:600;color:var(--text)}
.vis-tabs{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap}
.vis-tab{padding:6px 16px;border-radius:20px;border:var(--border);background:transparent;color:var(--text2);font-size:13px;cursor:pointer;font-family:inherit}
.vis-tab.active-all{background:#E6F1FB;color:#0C447C;border-color:#B5D4F4}
.vis-tab.active-shared{background:#E1F5EE;color:#085041;border-color:#9FE1CB}
.vis-tab.active-personal{background:#FAEEDA;color:#633806;border-color:#FAC775}
.filters{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;align-items:center}
.filter-btn{padding:5px 12px;border-radius:20px;border:var(--border);background:transparent;color:var(--text2);font-size:12px;cursor:pointer;font-family:inherit}
.filter-btn.active{background:#E6F1FB;color:#0C447C;border-color:#B5D4F4}
.search-input{padding:7px 12px;border-radius:var(--radius);border:1px solid rgba(0,0,0,0.15);font-size:13px;min-width:160px;flex:1;max-width:240px;font-family:inherit}
.list{display:flex;flex-direction:column;gap:10px}
.item{background:#fff;border:var(--border);border-radius:var(--radius-lg);padding:14px 16px}
.item.urgente{border-left:3px solid #E24B4A}
.item.presto{border-left:3px solid #EF9F27}
.item.ok{border-left:3px solid #639922}
.item.scaduto{border-left:3px solid #888780;opacity:0.7}
.item-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
.item-title{font-size:14px;font-weight:600;color:var(--text)}
.item-meta{font-size:12px;color:var(--text2);margin-top:2px}
.badges{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.badge{font-size:11px;padding:3px 8px;border-radius:20px;font-weight:500}
.badge-gara{background:#E6F1FB;color:#0C447C}
.badge-bollettino{background:#FAEEDA;color:#633806}
.badge-doc{background:#E1F5EE;color:#085041}
.badge-altro{background:#F1EFE8;color:#444441}
.badge-urgente{background:#FCEBEB;color:#791F1F}
.badge-presto{background:#FAEEDA;color:#854F0B}
.badge-ok{background:#EAF3DE;color:#3B6D11}
.badge-scaduto{background:#F1EFE8;color:#5F5E5A}
.badge-shared{background:#E1F5EE;color:#085041;border:0.5px solid #9FE1CB}
.badge-personal{background:#FAEEDA;color:#633806;border:0.5px solid #FAC775}
.badge-owner{background:#F1EFE8;color:#444441;font-size:10px}
.item-footer{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-top:8px}
.item-date{font-size:12px;color:var(--text2)}
.item-date strong{color:var(--text)}
.item-actions{display:flex;gap:5px;flex-wrap:wrap}
.act-btn{padding:4px 10px;font-size:11px;border-radius:var(--radius);border:var(--border);background:transparent;color:var(--text2);cursor:pointer;font-family:inherit}
.act-btn:hover{background:#f0f0ee}
.act-btn:disabled{opacity:0.35;cursor:default}
.reminders{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.reminder-tag{font-size:11px;padding:2px 7px;border-radius:10px;background:#f5f5f3;color:var(--text2);border:var(--border)}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
.modal{background:#fff;border-radius:var(--radius-lg);border:var(--border);padding:1.5rem;width:100%;max-width:540px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:18px;font-weight:600;margin-bottom:1.25rem}
.form-group{margin-bottom:14px}
.form-label{font-size:12px;color:var(--text2);margin-bottom:5px;display:block;font-weight:500}
.form-input{width:100%;padding:8px 12px;border-radius:var(--radius);border:1px solid rgba(0,0,0,0.2);font-size:13px;font-family:inherit}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:500px){.form-row{grid-template-columns:1fr}}
.tag-scelta{display:flex;gap:6px;flex-wrap:wrap}
.tag-opt{padding:5px 12px;border-radius:20px;border:var(--border);font-size:12px;cursor:pointer;background:transparent;color:var(--text2);font-family:inherit}
.tag-opt.sel-gara{background:#E6F1FB;color:#0C447C;border-color:#B5D4F4}
.tag-opt.sel-bollettino{background:#FAEEDA;color:#633806;border-color:#FAC775}
.tag-opt.sel-doc{background:#E1F5EE;color:#085041;border-color:#9FE1CB}
.tag-opt.sel-altro{background:#F1EFE8;color:#444441;border-color:#D3D1C7}
.vis-toggle{display:flex;gap:8px;margin-top:2px;flex-wrap:wrap}
.vis-btn{padding:7px 16px;border-radius:var(--radius);border:1px solid rgba(0,0,0,0.2);font-size:13px;cursor:pointer;background:transparent;font-family:inherit}
.vis-btn.sel-shared{background:#E1F5EE;color:#085041;border-color:#9FE1CB}
.vis-btn.sel-personal{background:#FAEEDA;color:#633806;border-color:#FAC775}
.reminder-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.reminder-row select{flex:1;padding:6px 10px;border-radius:var(--radius);border:1px solid rgba(0,0,0,0.2);font-size:13px;font-family:inherit}
.rm-del{padding:4px 8px;border:var(--border);border-radius:var(--radius);background:transparent;color:var(--text2);cursor:pointer;font-family:inherit}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:1.25rem;border-top:var(--border);padding-top:1rem}
.export-menu{position:relative;display:inline-block}
.export-dropdown{position:absolute;top:calc(100% + 4px);right:0;background:#fff;border:var(--border);border-radius:var(--radius);min-width:210px;z-index:50;box-shadow:0 4px 16px rgba(0,0,0,0.1)}
.export-opt{display:block;width:100%;padding:9px 14px;font-size:13px;text-align:left;background:transparent;border:none;cursor:pointer;font-family:inherit}
.export-opt:hover{background:#f5f5f3}
.export-opt-desc{font-size:11px;color:var(--text2);margin-top:1px}
.empty{text-align:center;padding:3rem;color:var(--text2);font-size:14px}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid #B5D4F4;border-top-color:#185FA5;border-radius:50%;animation:spin 0.7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:24px;right:24px;background:#2C2C2A;color:#F1EFE8;padding:10px 18px;border-radius:var(--radius);font-size:13px;z-index:200;pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,0.2)}
</style>

<body>
<div class="container" id="root"></div>
<script>
const SHEET_URL='https://script.google.com/macros/s/AKfycbzIpO-ar4fnwFmpHFMOivy66Xm05_LmHPnGBjG3KvXktA6I2qEFkbs9d-vSfDEH9qvv/exec';
function proxyUrl(url){
  return 'https://api.allorigins.win/get?url='+encodeURIComponent(url);
}
async function proxyFetch(url){
  const r=await fetch(proxyUrl(url));
  const d=await r.json();
  return JSON.parse(d.contents);
}
const KEY_USER='scad_username_v1';
const KEY_PERS='scad_personal_v1'; // legacy cache only, not used for storage anymore
const KEY_CACHE='scad_shared_cache_v1';
const KEY_PERS_CACHE='scad_personal_cache_v1';

let state={username:null,nameInput:'',personalItems:[],sharedItems:[],visTab:'all',filter:'tutti',search:'',showModal:false,editItem:null,showExportMenu:false,backendStatus:'loading',syncing:false};

function loadLocal(){
  state.username=localStorage.getItem(KEY_USER)||null;
  try{state.sharedItems=JSON.parse(localStorage.getItem(KEY_CACHE)||'[]');}catch(e){state.sharedItems=[];}
  try{state.personalItems=JSON.parse(localStorage.getItem(KEY_PERS_CACHE)||'[]');}catch(e){state.personalItems=[];}
}
function cacheShared(){try{localStorage.setItem(KEY_CACHE,JSON.stringify(state.sharedItems));}catch(e){}}
function cachePersonal(){try{localStorage.setItem(KEY_PERS_CACHE,JSON.stringify(state.personalItems));}catch(e){}}

async function sheetsGet(){
  if(!state.username)return;
  state.backendStatus='loading';state.syncing=true;render();
  try{
    const d=await proxyFetch(SHEET_URL+'?action=getAll&owner='+encodeURIComponent(state.username));
    if(d.error)throw new Error(d.error);
    const all=d.items||[];
    state.sharedItems=all.filter(function(i){return i.visibility==='shared'||!i.visibility;});
    state.personalItems=all.filter(function(i){return i.visibility==='personal';});
    cacheShared();cachePersonal();
    state.backendStatus='ok';
  }catch(e){state.backendStatus='error';showToast('Errore connessione: '+e.message);}
  state.syncing=false;render();
}
async function sheetsSave(item){
  try{
    var params='action=save&owner='+encodeURIComponent(state.username)+'&item='+encodeURIComponent(JSON.stringify(item));
    proxyFetch(SHEET_URL+'?'+params).catch(function(){});
  }
  catch(e){showToast('Errore salvataggio remoto');}
}
async function sheetsDelete(id,visibility){
  try{
    var params='action=delete&id='+encodeURIComponent(id)+'&owner='+encodeURIComponent(state.username);
    proxyFetch(SHEET_URL+'?'+params).catch(function(){});
  }
  catch(e){showToast('Errore eliminazione remota');}
}

function addDays(n){const d=new Date();d.setDate(d.getDate()+n);return d.toISOString().split('T')[0];}
function getDiff(s){const n=new Date();n.setHours(0,0,0,0);const sc=new Date(s);sc.setHours(0,0,0,0);return Math.round((sc-n)/86400000);}
function getStatus(i){if(i.completato)return'completato';const d=getDiff(i.scadenza);if(d<0)return'scaduto';if(d<=3)return'urgente';if(d<=14)return'presto';return'ok';}
function getStatusLabel(s){return{urgente:'Urgente',presto:'In scadenza',ok:'Nei tempi',scaduto:'Scaduto',completato:'Completato'}[s]||s;}
function getTipoLabel(t){return{gara:"Gara d'appalto",bollettino:'Bollettino',doc:'Documentazione',altro:'Altro'}[t]||t;}
function formatDate(s){return new Date(s).toLocaleDateString('it-IT',{day:'2-digit',month:'long',year:'numeric'});}
function formatDiff(d){if(d===0)return'oggi';if(d===1)return'domani';if(d===-1)return'ieri';if(d<0)return Math.abs(d)+' gg fa';return'tra '+d+' gg';}
function initials(n){return(n||'?').split(' ').map(function(w){return w[0];}).join('').toUpperCase().slice(0,2);}

function allItems(){
  var p=state.personalItems.map(function(i){return Object.assign({},i,{visibility:'personal'});});
  var s=state.sharedItems.map(function(i){return Object.assign({},i,{visibility:i.visibility||'shared'});});
  if(state.visTab==='personal')return p;
  if(state.visTab==='shared')return s;
  return p.concat(s);
}
function filteredItems(){
  var items=allItems();
  if(state.search)items=items.filter(function(i){return i.titolo.toLowerCase().includes(state.search.toLowerCase())||((i.ente||'').toLowerCase().includes(state.search.toLowerCase()));});
  var f=state.filter;
  if(f==='urgenti')items=items.filter(function(i){return getStatus(i)==='urgente';});
  else if(f==='presto')items=items.filter(function(i){return getStatus(i)==='presto';});
  else if(f==='gara')items=items.filter(function(i){return i.tipo==='gara';});
  else if(f==='bollettino')items=items.filter(function(i){return i.tipo==='bollettino';});
  else if(f==='doc')items=items.filter(function(i){return i.tipo==='doc';});
  else if(f==='scaduti')items=items.filter(function(i){return getStatus(i)==='scaduto';});
  return items.sort(function(a,b){return new Date(a.scadenza)-new Date(b.scadenza);});
}
function getStats(){
  var items=allItems().filter(function(i){return!i.completato;});
  return{totale:allItems().length,urgenti:items.filter(function(i){return getDiff(i.scadenza)<=3&&getDiff(i.scadenza)>=0;}).length,settimana:items.filter(function(i){return getDiff(i.scadenza)>3&&getDiff(i.scadenza)<=7;}).length,scaduti:items.filter(function(i){return getDiff(i.scadenza)<0;}).length};
}

function openEdit(item){
  state.editItem=item?JSON.parse(JSON.stringify(item)):{id:'i_'+Date.now(),titolo:'',ente:'',tipo:'gara',scadenza:'',importo:'',note:'',reminders:[{unit:'giorni',value:7},{unit:'ore',value:24}],completato:false,owner:state.username,visibility:'shared'};
  state.showModal=true;render();
}
function closeModal(){state.showModal=false;state.editItem=null;render();}

async function saveItem(){
  var e=state.editItem;
  if(!e.titolo||!e.scadenza){showToast('Compila titolo e scadenza');return;}
  e.owner=state.username;
  // Aggiorna cache locale
  if(e.visibility==='shared'){
    var idx=state.sharedItems.findIndex(function(i){return i.id===e.id;});
    if(idx>=0)state.sharedItems[idx]=e;else state.sharedItems.unshift(e);
    cacheShared();
  }else{
    var idx2=state.personalItems.findIndex(function(i){return i.id===e.id;});
    if(idx2>=0)state.personalItems[idx2]=e;else state.personalItems.unshift(e);
    cachePersonal();
  }
  // Salva su Sheets (sia shared che personal)
  await sheetsSave(e);
  state.showModal=false;state.editItem=null;render();showToast('Scadenza salvata');
}

async function toggleCompletato(id,visibility){
  var list=visibility==='shared'?state.sharedItems:state.personalItems;
  var item=list.find(function(i){return i.id===id;});
  if(!item)return;
  item.completato=!item.completato;
  if(visibility==='shared')cacheShared();else cachePersonal();
  await sheetsSave(item);
  render();
}

async function deleteItem(id,visibility){
  if(visibility==='shared'){
    state.sharedItems=state.sharedItems.filter(function(i){return i.id!==id;});
    cacheShared();
  }else{
    state.personalItems=state.personalItems.filter(function(i){return i.id!==id;});
    cachePersonal();
  }
  await sheetsDelete(id,visibility);
  render();
}

function exportExcel(scope){
  var toExp=scope==='filtrati'?filteredItems():allItems().sort(function(a,b){return new Date(a.scadenza)-new Date(b.scadenza);});
  var wb=XLSX.utils.book_new();
  var headers=['Titolo','Ente','Categoria','Scadenza','Giorni al termine','Stato','Visibilità','Creato da','Importo','Note','Promemoria'];
  var rows=toExp.map(function(item){return[item.titolo,item.ente||'',getTipoLabel(item.tipo),formatDate(item.scadenza),getDiff(item.scadenza),getStatusLabel(getStatus(item)),item.visibility==='shared'?'Generale':'Personale',item.owner||'',item.importo||'',item.note||'',(item.reminders||[]).map(function(r){return r.value+' '+r.unit+' prima';}).join(' | ')];});
  var ws=XLSX.utils.aoa_to_sheet([headers].concat(rows));
  ws['!cols']=[{wch:40},{wch:25},{wch:18},{wch:20},{wch:14},{wch:14},{wch:12},{wch:18},{wch:14},{wch:30},{wch:30}];
  XLSX.utils.book_append_sheet(wb,ws,'Scadenze');
  var urgenti=toExp.filter(function(i){return['urgente','presto'].includes(getStatus(i));});
  var ws2=XLSX.utils.aoa_to_sheet([headers].concat(urgenti.map(function(item){return[item.titolo,item.ente||'',getTipoLabel(item.tipo),formatDate(item.scadenza),getDiff(item.scadenza),getStatusLabel(getStatus(item)),item.visibility==='shared'?'Generale':'Personale',item.owner||'',item.importo||'',item.note||'',(item.reminders||[]).map(function(r){return r.value+' '+r.unit+' prima';}).join(' | ')];})));
  ws2['!cols']=ws['!cols'];
  XLSX.utils.book_append_sheet(wb,ws2,'Urgenti e in scadenza');
  XLSX.writeFile(wb,'Scadenziario_'+new Date().toISOString().split('T')[0]+'.xlsx');
  state.showExportMenu=false;render();showToast('Excel scaricato');
}

function showToast(msg){
  var t=document.getElementById('toast');
  if(!t){t=document.createElement('div');t.id='toast';t.className='toast';document.body.appendChild(t);}
  t.textContent=msg;t.style.display='block';
  clearTimeout(t._t);t._t=setTimeout(function(){t.style.display='none';},3000);
}

window.confirmName=function(){var n=(state.nameInput||'').trim();if(!n){showToast('Inserisci il tuo nome');return;}localStorage.setItem(KEY_USER,n);state.username=n;render();sheetsGet();};
window.setNameInput=function(v){state.nameInput=v;};
window.changeUser=function(){localStorage.removeItem(KEY_USER);state.username=null;state.personalItems=[];state.sharedItems=[];render();};
window.setVisTab=function(t){state.visTab=t;render();};
window.setFilter=function(f){state.filter=f;render();};
window.setSearch=function(v){state.search=v;render();};
window.setTipo=function(t){state.editItem.tipo=t;render();};
window.setVis=function(v){state.editItem.visibility=v;render();};
window.openEdit=openEdit;window.closeModal=closeModal;window.saveItem=saveItem;
window.toggleCompletato=toggleCompletato;window.deleteItem=deleteItem;
window.toggleExportMenu=function(){state.showExportMenu=!state.showExportMenu;render();};
window.exportExcel=exportExcel;
window.updateReminder=function(i,k,v){state.editItem.reminders[i][k]=k==='value'?parseInt(v):v;};
window.removeReminder=function(i){state.editItem.reminders.splice(i,1);render();};
window.addReminder=function(){state.editItem.reminders.push({unit:'giorni',value:7});render();};
window.openCalendar=function(item){if(!item)return;var sc=new Date(item.scadenza);var ds=sc.getFullYear()+''+String(sc.getMonth()+1).padStart(2,'0')+''+String(sc.getDate()).padStart(2,'0');window.open('https://calendar.google.com/calendar/render?action=TEMPLATE&text='+encodeURIComponent(item.titolo)+'&dates='+ds+'/'+ds,'_blank');};
window.openGmail=function(item){if(!item)return;var sub=encodeURIComponent('Promemoria: '+item.titolo);var body=encodeURIComponent('Scadenza: '+formatDate(item.scadenza)+'\nEnte: '+(item.ente||'')+'\n'+(item.importo||''));window.open('https://mail.google.com/mail/?view=cm&su='+sub+'&body='+body,'_blank');};
window.syncNow=function(){sheetsGet();};

function render(){
  var root=document.getElementById('root');
  if(!state.username){
    root.innerHTML='<div class="onboard"><div class="logo">SC</div><div class="onboard-title">Scadenziario Spinel Caffè</div><div class="onboard-sub">Inserisci il tuo nome per accedere. Sarà usato per identificare le tue scadenze personali e sincronizzarle su tutti i tuoi dispositivi.</div><div class="onboard-form"><input class="onboard-input" placeholder="Es. Mario Rossi" oninput="setNameInput(this.value)" onkeydown="if(event.key===\'Enter\')confirmName()"><button class="btn btn-primary" onclick="confirmName()">Accedi</button></div><p style="font-size:12px;color:#9a9a9a">Il nome è il tuo identificativo — usalo sempre uguale su tutti i dispositivi</p></div>';
    return;
  }
  var items=filteredItems();var stats=getStats();
  var bs=state.backendStatus;
  var bsColor={ok:'#EAF3DE',error:'#FCEBEB',loading:'#E6F1FB'}[bs]||'#EAF3DE';
  var bsBorder={ok:'#C0DD97',error:'#F7C1C1',loading:'#B5D4F4'}[bs]||'#C0DD97';
  var bsText={ok:'#3B6D11',error:'#791F1F',loading:'#185FA5'}[bs]||'#3B6D11';
  var bsMsg={ok:'Google Sheets connesso — scadenze personali e generali sincronizzate su tutti i dispositivi',error:'Errore connessione — mostro cache locale',loading:'Connessione a Google Sheets in corso...'}[bs]||'';

  var itemModal=state.showModal&&state.editItem?'<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal"><div class="modal-title">'+((state.sharedItems.find(function(i){return i.id===state.editItem.id;})||state.personalItems.find(function(i){return i.id===state.editItem.id;}))?'Modifica scadenza':'Nuova scadenza')+'</div><div class="form-group"><label class="form-label">Titolo *</label><input class="form-input" placeholder="Es. Gara servizi informatici..." value="'+(state.editItem.titolo||'')+'" oninput="state.editItem.titolo=this.value"></div><div class="form-row"><div class="form-group"><label class="form-label">Ente</label><input class="form-input" placeholder="Comune di..." value="'+(state.editItem.ente||'')+'" oninput="state.editItem.ente=this.value"></div><div class="form-group"><label class="form-label">Importo</label><input class="form-input" placeholder="€ 50.000" value="'+(state.editItem.importo||'')+'" oninput="state.editItem.importo=this.value"></div></div><div class="form-row"><div class="form-group"><label class="form-label">Scadenza *</label><input class="form-input" type="date" value="'+(state.editItem.scadenza||'')+'" onchange="state.editItem.scadenza=this.value"></div><div class="form-group"><label class="form-label">Categoria</label><div class="tag-scelta" style="margin-top:2px">'+['gara','bollettino','doc','altro'].map(function(t){return'<button class="tag-opt '+(state.editItem.tipo===t?'sel-'+t:'')+'" onclick="setTipo(\''+t+'\')">'+getTipoLabel(t)+'</button>';}).join('')+'</div></div></div><div class="form-group"><label class="form-label">Note</label><input class="form-input" placeholder="CIG, riferimenti..." value="'+(state.editItem.note||'')+'" oninput="state.editItem.note=this.value"></div><div class="form-group"><label class="form-label">Visibilità</label><div class="vis-toggle"><button class="vis-btn '+(state.editItem.visibility==='shared'?'sel-shared':'')+'" onclick="setVis(\'shared\')">Generale (tutti la vedono)</button><button class="vis-btn '+(state.editItem.visibility==='personal'?'sel-personal':'')+'" onclick="setVis(\'personal\')">Personale (solo tu, su tutti i dispositivi)</button></div></div><div class="form-group"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px"><label class="form-label" style="margin:0">Promemoria</label><button class="act-btn" onclick="addReminder()">+ Aggiungi</button></div>'+(state.editItem.reminders||[]).map(function(r,i){return'<div class="reminder-row"><select onchange="updateReminder('+i+',\'value\',this.value)">'+[1,2,3,5,7,14,30].map(function(v){return'<option value="'+v+'" '+(r.value==v?'selected':'')+'>'+v+'</option>';}).join('')+'</select><select onchange="updateReminder('+i+',\'unit\',this.value)"><option value="ore" '+(r.unit==='ore'?'selected':'')+'>ore prima</option><option value="giorni" '+(r.unit==='giorni'?'selected':'')+'>giorni prima</option></select><button class="rm-del" onclick="removeReminder('+i+')">✕</button></div>';}).join('')+(!(state.editItem.reminders||[]).length?'<div style="font-size:12px;color:#9a9a9a">Nessun promemoria</div>':'')+'</div><div class="modal-footer"><button class="btn" onclick="closeModal()">Annulla</button><button class="btn btn-primary" onclick="saveItem()">Salva</button></div></div></div>':'';

  root.innerHTML='<div onclick="if(!event.target.closest(\'.export-menu\'))state.showExportMenu=false"><div class="header"><div><div class="title">Scadenziario Spinel Caffè</div><div class="subtitle">Gare d\'appalto, bollettini e scadenze amministrative</div></div><div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center"><div class="user-chip"><div class="user-avatar">'+initials(state.username)+'</div>'+state.username+'<button class="act-btn btn-sm" onclick="changeUser()" style="margin-left:4px">Cambia</button></div><div class="export-menu"><button class="btn btn-green btn-sm" onclick="event.stopPropagation();toggleExportMenu()">Esporta Excel</button>'+(state.showExportMenu?'<div class="export-dropdown"><button class="export-opt" onclick="exportExcel(\'tutti\')"><div>Tutte le scadenze</div><div class="export-opt-desc">'+allItems().length+' elementi totali</div></button><button class="export-opt" onclick="exportExcel(\'filtrati\')"><div>Vista corrente</div><div class="export-opt-desc">'+filteredItems().length+' elementi</div></button></div>':'')+'</div><button class="btn btn-primary btn-sm" onclick="openEdit(null)">+ Nuova scadenza</button></div></div>'
  +'<div class="backend-banner" style="background:'+bsColor+';border:0.5px solid '+bsBorder+';color:'+bsText+'">'+(bs==='loading'?'<div class="spinner"></div>':'<div class="status-dot" style="background:'+bsText+'"></div>')+'<span style="flex:1">'+bsMsg+'</span>'+(bs==='ok'?'<button style="background:#3B6D11;color:#fff;border-radius:8px" onclick="syncNow()">Sincronizza</button>':'')+(bs==='error'?'<button style="background:#A32D2D;color:#fff;border-radius:8px" onclick="syncNow()">Riprova</button>':'')+'</div>'
  +'<div class="stats"><div class="stat"><div class="stat-label">Totale</div><div class="stat-value">'+stats.totale+'</div></div><div class="stat"><div class="stat-label">Urgenti (≤3 gg)</div><div class="stat-value" style="color:#A32D2D">'+stats.urgenti+'</div></div><div class="stat"><div class="stat-label">Questa settimana</div><div class="stat-value" style="color:#854F0B">'+stats.settimana+'</div></div><div class="stat"><div class="stat-label">Scaduti</div><div class="stat-value" style="color:#6b6b6b">'+stats.scaduti+'</div></div></div>'
  +'<div class="vis-tabs"><button class="vis-tab '+(state.visTab==='all'?'active-all':'')+'" onclick="setVisTab(\'all\')">Tutte ('+allItems().length+')</button><button class="vis-tab '+(state.visTab==='shared'?'active-shared':'')+'" onclick="setVisTab(\'shared\')">Generali ('+state.sharedItems.length+')</button><button class="vis-tab '+(state.visTab==='personal'?'active-personal':'')+'" onclick="setVisTab(\'personal\')">Personali ('+state.personalItems.length+')</button></div>'
  +'<div class="filters"><input class="search-input" placeholder="Cerca titolo o ente..." value="'+state.search+'" oninput="setSearch(this.value)">'+['tutti','urgenti','presto','gara','bollettino','doc','scaduti'].map(function(f){return'<button class="filter-btn '+(state.filter===f?'active':'')+'" onclick="setFilter(\''+f+'\')">'+{tutti:'Tutti',urgenti:'Urgenti',presto:'In scadenza',gara:'Gare',bollettino:'Bollettini',doc:'Documenti',scaduti:'Scaduti'}[f]+'</button>';}).join('')+'</div>'
  +'<div class="list">'+(items.length===0&&bs!=='loading'?'<div class="empty">Nessuna scadenza trovata</div>':'')+(bs==='loading'&&items.length===0?'<div class="empty">Caricamento in corso...</div>':'')+items.map(function(item){
    var st=getStatus(item);var diff=getDiff(item.scadenza);
    var isOwner=item.owner===state.username||!item.owner;
    var isPersonal=item.visibility==='personal';
    var canEdit=isPersonal||isOwner;
    var tipoBadge={gara:'badge-gara',bollettino:'badge-bollettino',doc:'badge-doc',altro:'badge-altro'}[item.tipo]||'badge-altro';
    var stBadge={urgente:'badge-urgente',presto:'badge-presto',ok:'badge-ok',scaduto:'badge-scaduto',completato:'badge-scaduto'}[st];
    var diffColor={urgente:'#A32D2D',presto:'#854F0B',scaduto:'#5F5E5A',ok:'#3B6D11',completato:'#5F5E5A'}[st];
    return'<div class="item '+(item.completato?'scaduto':st)+'"><div class="item-header"><div><div class="item-title" style="'+(item.completato?'text-decoration:line-through;color:#9a9a9a':'')+'">'+item.titolo+'</div>'+(item.ente?'<div class="item-meta">'+item.ente+'</div>':'')+(item.note?'<div class="item-meta">'+item.note+'</div>':'')+'</div><div class="badges"><span class="badge '+(isPersonal?'badge-personal':'badge-shared')+'">'+(isPersonal?'Personale':'Generale')+'</span><span class="badge '+tipoBadge+'">'+getTipoLabel(item.tipo)+'</span><span class="badge '+stBadge+'">'+getStatusLabel(st)+'</span>'+(item.importo?'<span class="badge badge-altro">'+item.importo+'</span>':'')+(!isPersonal&&item.owner?'<span class="badge badge-owner">di '+item.owner+'</span>':'')+'</div></div>'+(item.reminders&&item.reminders.length?'<div class="reminders">'+item.reminders.map(function(r){return'<span class="reminder-tag">'+r.value+' '+r.unit+' prima</span>';}).join('')+'</div>':'')+'<div class="item-footer"><div class="item-date">Scadenza: <strong>'+formatDate(item.scadenza)+'</strong> — <span style="color:'+diffColor+'">'+formatDiff(diff)+'</span></div><div class="item-actions"><button class="act-btn" onclick="openCalendar(filteredItems().find(function(i){return i.id===\''+item.id+'\';}))">Cal</button><button class="act-btn" onclick="openGmail(filteredItems().find(function(i){return i.id===\''+item.id+'\';}))">Mail</button><button class="act-btn" '+(canEdit?'':'disabled')+' onclick="'+(canEdit?'openEdit(filteredItems().find(function(i){return i.id===\''+item.id+'\';}))':'void 0')+'">Modifica</button><button class="act-btn" onclick="toggleCompletato(\''+item.id+'\',\''+item.visibility+'\')">'+(item.completato?'Riapri':'Chiudi')+'</button><button class="act-btn" '+(canEdit?'':'disabled')+' style="color:'+(canEdit?'#A32D2D':'inherit')+'" onclick="'+(canEdit?'if(confirm(\'Eliminare?\'))deleteItem(\''+item.id+'\',\''+item.visibility+'\')':'void 0')+'">Elimina</button></div></div></div>';
  }).join('')+'</div></div>'+itemModal;
}

loadLocal();
render();
if(state.username)sheetsGet();

</script>
